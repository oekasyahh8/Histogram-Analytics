<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histogram Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Mono',monospace;background:#0d0f14;color:#e8eaf2;min-height:100vh;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(91,138,245,.04)1px,transparent 1px),linear-gradient(90deg,rgba(91,138,245,.04)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.gate{position:relative;z-index:1;background:#13161e;border:1px solid #252939;border-radius:16px;padding:40px 36px;width:300px;text-align:center;animation:gFade .5s ease both}
@keyframes gFade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.gate-icon{font-size:2rem;margin-bottom:14px}
.gate h2{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,#5b8af5,#f05d8e,#36e8b2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.gate-sub{font-size:.63rem;color:#6b7394;letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px}
.pin-row{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid #252939;background:transparent;transition:all .2s}
.pin-dot.filled{background:#5b8af5;border-color:#5b8af5;box-shadow:0 0 8px rgba(91,138,245,.6)}
.pin-dot.err{background:#f05d8e;border-color:#f05d8e;box-shadow:0 0 8px rgba(240,93,142,.6);animation:shk .3s ease}
.pin-dot.ok{background:#36e8b2;border-color:#36e8b2;box-shadow:0 0 8px rgba(54,232,178,.6)}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.key{padding:11px;background:#1a1e29;border:1px solid #252939;border-radius:8px;color:#e8eaf2;font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s;user-select:none}
.key:hover{background:#252939;border-color:#5b8af5;color:#5b8af5;transform:translateY(-1px)}
.key:active{transform:translateY(0)}
.zero{grid-column:2}
.del{background:rgba(240,93,142,.1);border-color:rgba(240,93,142,.25);color:#f05d8e}
.del:hover{background:rgba(240,93,142,.2)}
.err-txt{font-size:.6rem;color:#f05d8e;margin-top:10px;min-height:14px}
:root.light body{background:#f0f2f8;color:#1a1d2e}
:root.light .gate{background:#fff;border-color:#cdd2e8}
:root.light .pin-dot{border-color:#cdd2e8}
:root.light .key{background:#e8ecf5;border-color:#cdd2e8;color:#1a1d2e}
:root.light .key:hover{background:#cdd2e8;border-color:#3b6ae8;color:#3b6ae8}
</style>
</head>
<body>
<div class="gate" id="G">
  <div class="gate-icon">🔐</div>
  <h2>Histogram Analytics</h2>
  <div class="gate-sub">Masukkan kode akses</div>
  <div class="pin-row" id="PR">
    <div class="pin-dot" id="p0"></div>
    <div class="pin-dot" id="p1"></div>
    <div class="pin-dot" id="p2"></div>
    <div class="pin-dot" id="p3"></div>
    <div class="pin-dot" id="p4"></div>
    <div class="pin-dot" id="p5"></div>
  </div>
  <div class="keypad">
    <button class="key" onclick="K('1')">1</button>
    <button class="key" onclick="K('2')">2</button>
    <button class="key" onclick="K('3')">3</button>
    <button class="key" onclick="K('4')">4</button>
    <button class="key" onclick="K('5')">5</button>
    <button class="key" onclick="K('6')">6</button>
    <button class="key" onclick="K('7')">7</button>
    <button class="key" onclick="K('8')">8</button>
    <button class="key" onclick="K('9')">9</button>
    <button class="key zero" onclick="K('0')">0</button>
    <button class="key del" onclick="D()">⌫</button>
  </div>
  <div class="err-txt" id="ET"></div>
</div>
